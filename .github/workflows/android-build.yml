name: android-build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "opennow-stable/**"
      - ".github/workflows/android-build.yml"
  push:
    branches:
      - Android
      - main
    tags:
      - "v*"
      - "android-v*"
    paths:
      - "opennow-stable/**"
      - ".github/workflows/android-build.yml"

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: opennow-stable

    env:
      npm_config_audit: "false"
      npm_config_fund: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('opennow-stable/android/**/*.gradle*', 'opennow-stable/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Build web bundle
        run: npm run build

      - name: Sync to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: opennow-stable/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opennow-android-debug
          path: opennow-stable/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
